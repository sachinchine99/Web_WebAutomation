name: ShopNest UI Automation — CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chrome'
        type: choice
        options: [ chrome, edge ]

jobs:
  ui-tests:
    name: Run UI Automation Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [ chrome ]  # Extend to [chrome, edge] when edge runner is available

    steps:

      # ── 1. Checkout source ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ──────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # ── 3. Set up Chrome ───────────────────────────────────────────────────
      - name: Set up Chrome (latest stable)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── 4. Cache Maven dependencies ────────────────────────────────────────
      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── 5. Run tests ───────────────────────────────────────────────────────
      - name: Run TestNG suite
        run: |
          mvn clean test \
            -Dbrowser=${{ matrix.browser }} \
            -Dheadless=true \
            -Dmaven.test.failure.ignore=false
        env:
          VALID_USERNAME: ${{ secrets.VALID_USERNAME }}
          VALID_PASSWORD: ${{ secrets.VALID_PASSWORD }}

      # ── 6. Generate Allure report ──────────────────────────────────────────
      - name: Generate Allure Report
        if: always()
        run: mvn allure:report -q

      # ── 7. Upload Allure report as artifact ────────────────────────────────
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.browser }}
          path: target/site/allure-maven-plugin
          retention-days: 14

      # ── 8. Upload Extent Report ────────────────────────────────────────────
      - name: Upload Extent HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ matrix.browser }}
          path: test-output/ExtentReports/
          retention-days: 14

      # ── 9. Upload screenshots on failure ───────────────────────────────────
      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ matrix.browser }}
          path: test-output/screenshots/
          retention-days: 7

      # ── 10. Publish test results summary ───────────────────────────────────
      - name: Publish TestNG Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: TestNG Results (${{ matrix.browser }})
          path: target/surefire-reports/testng-results.xml
          reporter: java-junit